<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="calculadora">
        <h1>Calculadora</h1>
        <input type="text" id="resultado" disabled>
        <div class="teclado">
            <button class="numero">7</button>
            <button class="numero">8</button>
            <button class="numero">9</button>
            <button class="operador">+</button>
            <button class="numero">4</button>
            <button class="numero">5</button>
            <button class="numero">6</button>
            <button class="operador">-</button>
            <button class="numero">1</button>
            <button class="numero">2</button>
            <button class="numero">3</button>
            <button class="operador">*</button>
            <button class="numero">0</button>
            <button class="operador">^</button>
            <button class="operador">!</button>
            <button class="operador">/</button>
            <button class="operador">primo</button>
            <button class="limpar">C</button>
            <button class="igual">=</button>
            <button class="limpar-historico">Limpar Histórico</button>
        </div>

        <h2>Histórico de Operações</h2>
        <table id="historico">
            <thead>
                <tr>
                    <th>Operação</th>
                    <th>Resultado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
